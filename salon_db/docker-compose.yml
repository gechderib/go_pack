services:
  postgres:
    image: postgres:16
    container_name: go_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

# paql_url: host=localhost user=myuser password=mypass dbname=mydb port=5436 sslmode=disable